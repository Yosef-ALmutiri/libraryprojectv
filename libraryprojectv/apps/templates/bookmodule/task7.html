{% extends "layouts/base.html" %}
{% block title %} Students per City {% endblock title %}

{% block content %}
<h2>Number of all students in the city</h2>
<ul>
    {% for city in cities_stats %}
        <li>City: {{ city.city }} - Students: {{ city.student_count }}</li>
    {% endfor %}
</ul>
{% endblock content %}
