{% extends "layouts/base.html" %}
{% block title %} Add Book {% endblock %}
{% block content %}
<h2>Add a New Book</h2>
<form method="POST">
    {% csrf_token %}
    <label>Title:</label><br>
    <input type="text" name="title" required><br><br>

    <label>Author:</label><br>
    <input type="text" name="author"><br><br>

    <label>Price:</label><br>
    <input type="number" step="0.01" name="price" value="0.0"><br><br>

    <label>Edition:</label><br>
    <input type="number" name="edition" value="1"><br><br>

    <button type="submit" style="padding: 10px; background-color: blue; color: white;">Save Book</button>
    <a href="{% url 'listbooks' %}" style="margin-left: 10px;">Cancel</a>
</form>
{% endblock %}
