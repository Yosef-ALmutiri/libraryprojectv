{% extends "layouts/base.html" %}
{% block title %} Edit Book {% endblock %}
{% block content %}
<h2>Edit Book: {{ book.title }}</h2>
<form method="POST">
    {% csrf_token %}
    <label>Title:</label><br>
    <input type="text" name="title" value="{{ book.title }}" required><br><br>

    <label>Author:</label><br>
    <input type="text" name="author" value="{{ book.author }}"><br><br>

    <label>Price:</label><br>
    <input type="number" step="0.01" name="price" value="{{ book.price }}"><br><br>

    <label>Edition:</label><br>
    <input type="number" name="edition" value="{{ book.edition }}"><br><br>

    <button type="submit" style="padding: 10px; background-color: orange; color: white;">Update Book</button>
    <a href="{% url 'listbooks' %}" style="margin-left: 10px;">Cancel</a>
</form>
{% endblock %}
